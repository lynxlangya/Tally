<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JustOne 导出数据界面</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec37",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102213",
                        "surface-dark": "#162b1a",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased selection:bg-primary selection:text-background-dark text-gray-900 dark:text-white">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
<div class="sticky top-0 z-10 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md">
<div class="flex items-center justify-between px-4 pb-4 pt-12 md:pt-8">
<button class="flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors group">
<span class="material-symbols-outlined text-[26px] text-gray-900 dark:text-white group-hover:text-primary transition-colors">chevron_left</span>
</button>
<h1 class="text-lg font-semibold tracking-wide text-gray-900 dark:text-white">导出数据</h1>
<div class="w-10"></div>
</div>
</div>
<div class="flex-1 px-5 max-w-md mx-auto w-full flex flex-col pt-6 gap-8">
<div class="flex flex-col gap-3">
<h2 class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest ml-1">选择格式</h2>
<div class="grid grid-cols-2 gap-4">
<button class="relative flex flex-col items-center justify-center gap-3 p-5 rounded-2xl bg-primary/10 ring-2 ring-primary transition-all duration-200 group">
<div class="flex items-center justify-center rounded-full bg-primary text-background-dark size-12 shadow-sm">
<span class="material-symbols-outlined text-[26px]">table_chart</span>
</div>
<p class="text-primary text-[15px] font-semibold tracking-wide">CSV</p>
<div class="absolute top-3 right-3 text-primary">
<span class="material-symbols-outlined text-[20px] fill-1">check_circle</span>
</div>
</button>
<button class="relative flex flex-col items-center justify-center gap-3 p-5 rounded-2xl bg-white dark:bg-white/5 border border-gray-200 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-white/10 transition-all duration-200 group">
<div class="flex items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-gray-500 dark:text-gray-400 size-12 group-hover:text-white group-hover:bg-gray-400 dark:group-hover:bg-white/20 transition-colors">
<span class="material-symbols-outlined text-[26px]">picture_as_pdf</span>
</div>
<p class="text-gray-600 dark:text-gray-300 text-[15px] font-medium tracking-wide">PDF</p>
</button>
</div>
</div>
<div class="flex flex-col gap-3">
<h2 class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-widest ml-1">时间范围</h2>
<div class="bg-white dark:bg-white/5 rounded-2xl overflow-hidden ring-1 ring-gray-200 dark:ring-white/5">
<button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors border-b border-gray-100 dark:border-white/5">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center rounded-lg bg-green-100 dark:bg-green-500/20 text-green-600 dark:text-green-400 size-8">
<span class="material-symbols-outlined text-[18px]">calendar_today</span>
</div>
<span class="text-gray-900 dark:text-white text-[15px] font-medium">开始日期</span>
</div>
<div class="flex items-center gap-2">
<span class="text-gray-500 dark:text-gray-400 text-[15px]">2023年10月01日</span>
<span class="material-symbols-outlined text-gray-400 dark:text-white/20 text-[20px]">chevron_right</span>
</div>
</button>
<button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
<div class="flex items-center gap-3">
<div class="flex items-center justify-center rounded-lg bg-red-100 dark:bg-red-500/20 text-red-600 dark:text-red-400 size-8">
<span class="material-symbols-outlined text-[18px]">event</span>
</div>
<span class="text-gray-900 dark:text-white text-[15px] font-medium">结束日期</span>
</div>
<div class="flex items-center gap-2">
<span class="text-gray-500 dark:text-gray-400 text-[15px]">2023年10月31日</span>
<span class="material-symbols-outlined text-gray-400 dark:text-white/20 text-[20px]">chevron_right</span>
</div>
</button>
</div>
</div>
<div class="px-2">
<p class="text-xs text-gray-400 dark:text-gray-500 leading-relaxed">
                导出文件将包含所选时间范围内所有的收支记录。文件生成后，您可以选择分享或保存到本地。
            </p>
</div>
</div>
<div class="mt-auto p-5 pb-8 bg-gradient-to-t from-background-light dark:from-background-dark via-background-light dark:via-background-dark to-transparent">
<button class="w-full bg-primary hover:bg-green-400 text-background-dark text-[17px] font-bold py-4 rounded-2xl shadow-lg shadow-primary/20 hover:shadow-primary/30 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[24px]">ios_share</span>
            立即导出
        </button>
</div>
</div>

</body></html>
