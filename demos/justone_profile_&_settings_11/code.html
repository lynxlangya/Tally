<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},

        .no-scrollbar::-webkit-scrollbar {

            -ms-overflow-style: none;
            scrollbar-width: none;

        }

<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">

<div class="flex items-center justify-between px-4 pb-4 pt-12 md:pt-8">
<button class="flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-gray-200 dark:hover:bg-white/10 transition-colors group">
<span class="material-symbols-outlined text-[26px] text-gray-900 dark:text-white group-hover:text-primary transition-colors">chevron_left</span>
</button>
<h1 class="text-lg font-semibold tracking-wide text-gray-900 dark:text-white">语言设置</h1>
<div class="w-10"></div>
</div>
</div>
<div class="flex-1 px-5 max-w-md mx-auto w-full flex flex-col pt-6 gap-3">
<label class="group relative flex items-center justify-between p-5 w-full rounded-2xl bg-white dark:bg-surface-dark/50 hover:bg-gray-50 dark:hover:bg-surface-dark transition-all duration-200 cursor-pointer ring-1 ring-transparent dark:ring-white/5 border border-gray-100 dark:border-transparent">
<div class="flex items-center gap-4">
<span class="text-gray-900 dark:text-white text-[17px] font-medium tracking-wide">跟随系统</span>
</div>
<div class="relative">
<input checked="" class="peer sr-only" name="language" type="radio" value="system"/>
<div class="w-6 h-6 rounded-full border-2 border-gray-300 dark:border-white/20 peer-checked:border-primary peer-checked:bg-primary/10 transition-colors flex items-center justify-center">

</div>
</div>
</label>
<label class="group relative flex items-center justify-between p-5 w-full rounded-2xl bg-white dark:bg-surface-dark/50 hover:bg-gray-50 dark:hover:bg-surface-dark transition-all duration-200 cursor-pointer ring-1 ring-transparent dark:ring-white/5 border border-gray-100 dark:border-transparent">

<div class="w-3 h-3 rounded-full bg-primary opacity-0 peer-checked:opacity-100 transition-opacity shadow-[0_0_10px_rgba(19,236,55,0.6)]"></div>
</div>
</div>
</label>

</div>
</div>
</label>
