<!DOCTYPE html>
<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tally 快捷记账界面</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec37",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102213",
                        "surface-dark": "#1c2e20",
                        "text-dim": "#92c99b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .blink-cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark h-screen w-full flex flex-col font-display overflow-hidden text-white selection:bg-primary selection:text-background-dark">
<div class="flex-1 flex flex-col items-center justify-end pb-10 w-full relative">
<div class="w-20 h-20 rounded-full bg-surface-dark border border-white/5 flex items-center justify-center mb-6 shadow-2xl shadow-black/20">
<span class="material-symbols-outlined text-4xl text-primary">restaurant</span>
</div>
<div class="flex items-center bg-surface-dark/80 border border-white/10 rounded-full px-5 py-2.5 mb-8 shadow-sm backdrop-blur-sm">
<span class="text-sm font-bold text-white tracking-wide">餐饮</span>
<div class="w-px h-3 bg-white/20 mx-3"></div>
<input class="bg-transparent border-none p-0 text-sm text-white placeholder-white/30 focus:ring-0 w-32" placeholder="添加备注..." type="text"/>
</div>
<div class="flex items-baseline gap-1 px-4">
<span class="text-4xl font-bold text-white/40 align-top mt-2">¥</span>
<h1 class="text-[5rem] font-extrabold leading-none tracking-tight text-white">
                12.50<span class="w-1.5 h-16 inline-block bg-primary ml-2 align-middle blink-cursor rounded-full"></span>
</h1>
</div>
</div>
<div class="bg-surface-dark/30 backdrop-blur-xl rounded-t-[2.5rem] border-t border-white/5 pb-8 pt-2 shrink-0 w-full">
<div class="w-full flex justify-center py-4">
<div class="h-1.5 w-10 rounded-full bg-white/10"></div>
</div>
<div class="max-w-md mx-auto w-full px-4">
<div class="grid grid-cols-4 gap-3 mb-6">
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">1</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">2</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">3</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-white/70 shadow-sm border border-white/5">

</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">4</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">5</button>

</button>

<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">8</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">9</button>

</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-bold text-white shadow-sm border border-white/5 pb-2">.</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">0</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-2xl font-medium text-white shadow-sm border border-white/5">00</button>
<button class="h-16 flex items-center justify-center rounded-2xl bg-surface-dark hover:bg-white/10 active:scale-95 transition-all text-white/70 shadow-sm border border-white/5">
<span class="material-symbols-outlined text-2xl">add</span>
</button>
</div>
<div class="flex justify-center">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 bg-primary text-background-dark text-lg font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:bg-[#3bf55a] active:scale-[0.98] transition-all">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-2xl font-bold">check</span>
<span>确认记账</span>
</div>
</button>
</div>
</div>
</div>
